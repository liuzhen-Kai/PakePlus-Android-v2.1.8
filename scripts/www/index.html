    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #334155; 
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;

        }
        .app-wrapper { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        canvas { display: block; outline: none; }
        #home-ui-layer {
            position: absolute; top: 30px; left: 0; width: 100%;

            animation: fadeInDown 1.5s ease-out;
            display: flex; flex-direction: column; align-items: center;
        }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .home-title {
            font-size: 42px; font-weight: 900; color: #ffffff; 
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            letter-spacing: 4px; margin-bottom: 15px;
        }
        #tooltip {
            position: absolute; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8); padding: 20px; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25); color: #1e293b; font-size: 14px;
            /* 👉 修复核心 1：默认关闭点击拦截，避免隐形面板挡住节点 */
            pointer-events: none; opacity: 0; 
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translate(-50%, -100%); z-index: 20; max-width: 320px; max-height: 70vh;
            overflow-y: auto; text-align: left;
        }
        .tooltip-title { font-weight: 900; color: #2563eb; margin-bottom: 12px; font-size: 19px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .tooltip-desc { color: #475569; margin-bottom: 15px; line-height: 1.6; font-size: 14px; }
        .tooltip-eq { font-family: 'Consolas', monospace; background: #f8fafc; padding: 12px; border-radius: 8px; color: #dc2626; font-weight: bold; border: 1px solid #e2e8f0; }

        #orientation-tip { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(51, 65, 85, 0.95); color: #ffffff; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 10000; font-size: 20px; text-align: center; backdrop-filter: blur(12px); }

<body>

    <script>
        const AudioEngine = (function() {
            let ctx = null, unlocked = false;
            function init() {
                if(unlocked) return;
                const AC = window.AudioContext || window.webkitAudioContext;
                if(!AC) return; ctx = new AC();
                const o = ctx.createOscillator(); const g = ctx.createGain();
                g.gain.value = 0; o.connect(g); g.connect(ctx.destination);
                o.start(); o.stop(ctx.currentTime + 0.1); unlocked = true;
            }
            window.addEventListener('pointerdown', init, { once: true });
            return {
                playHover: () => { if(unlocked && ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.type='sine'; o.frequency.setValueAtTime(1200, ctx.currentTime); g.gain.setValueAtTime(0.02, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.05); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.05); } },
                playFocus: () => { if(unlocked && ctx) { const o=ctx.createOscillator(), g=ctx.createGain(); o.type='triangle'; o.frequency.setValueAtTime(150, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(600, ctx.currentTime+0.3); g.gain.setValueAtTime(0.06, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+0.4); } }
            };
        })();

        function triggerHaptic(type = 'light') {
            if (navigator.vibrate) {
                if (type === 'light') navigator.vibrate(8);
                else if (type === 'heavy') navigator.vibrate([15, 10]);
            }
        }

        function checkOrientation() {
            const tip = document.getElementById('orientation-tip');
            if (tip) tip.style.display = (window.innerHeight > window.innerWidth) ? 'flex' : 'none';
        }

        function gotoPage(page) {
            window.location.href = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1) + page;
        }

        const App = { resizeHome: null };
        window.addEventListener('resize', () => { if (App.resizeHome) App.resizeHome(); checkOrientation(); });

        (function createHomeScene() {
            const container = document.getElementById('home-canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 65); 

            const renderer = new THREE.WebGLRenderer({ 
                antialias: false, 
                alpha: true, 
                powerPreference: "high-performance" 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0)); 
            container.appendChild(renderer.domElement);

            const renderScene = new THREE.RenderPass(scene, camera);
            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.4, 0.92);
            const composer = new THREE.EffectComposer(renderer);
            composer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0)); 
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 👉 修复核心 2：完美匹配 2D 平面地图的视角控制器
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.1;
            controls.enableRotate = false; // 严禁 3D 旋转
            controls.enablePan = true;     // 允许平移
            controls.screenSpacePanning = true; // 关键配置：让平移跟随鼠标/手指，不随深度改变方向
            controls.enableZoom = true;    // 允许滚轮/双指缩放
            controls.zoomSpeed = 1.2;
            controls.minDistance = 15;     // 最大放大比例
            controls.maxDistance = 120;    // 最小缩小比例

            controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
            controls.touches = { ONE: THREE.TOUCH.PAN, TWO: THREE.TOUCH.DOLLY_PAN };

            scene.add(new THREE.AmbientLight(0xffffff, 0.85));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight.position.set(0, 0, 50);
            scene.add(dirLight);

            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(800 * 3); 
            for(let i=0; i<800 * 3; i++) { pPos[i] = (Math.random() - 0.5) * 200; }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const stars = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x94a3b8, size: 0.3, transparent: true, opacity: 0.1 }));
            stars.position.z = -15; scene.add(stars);

            const gridHelper = new THREE.GridHelper(200, 50, 0x64748b, 0x1e293b);
            gridHelper.position.z = -3; gridHelper.rotation.x = Math.PI / 2;
            gridHelper.material.opacity = 0.15; gridHelper.material.transparent = true;

            const radarGeo = new THREE.PlaneGeometry(200, 200);
            const radarMat = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color(0x3b82f6) } },

                fragmentShader: `uniform float uTime; uniform vec3 uColor; varying vec2 vUv; void main() { vec2 c = vec2(0.5); float d = distance(vUv, c) * 10.0; float w = fract(d - uTime * 0.5); float t = smoothstep(0.7, 0.9, w) * smoothstep(1.0, 0.9, w); float f = smoothstep(6.0, 0.0, d); gl_FragColor = vec4(uColor, t * f * 0.3); }`,
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
            });
            const radar = new THREE.Mesh(radarGeo, radarMat);
            radar.position.z = -2.95; scene.add(radar);

            const interactableNodes = [];
            const resetTargets = []; 
            const pulseElectrons = [];
            const allTubesAndArrows = [];
            let isFocusMode = false;
            let currentFocusedId = null; 
            let hoveredNode = null;

            let camTween = null;
            let targetTween = null;

            const tooltipData = { 
                'chlor': { title: '氯碱工业', desc: '工业上电解饱和食盐水制取 NaOH、Cl₂ 和 H₂。阳极使用钛网(防 Cl₂ 腐蚀)，阴极使用碳钢网。核心设备是【离子膜电解槽】，阳离子交换膜只允许 Na⁺ 和水分子通过，阻止 Cl⁻ 和 OH⁻，从而获得高纯度烧碱。', eq: '阳极: 2Cl⁻ - 2e⁻ ═ Cl₂↑<br>阴极: 2H₂O + 2e⁻ ═ H₂↑ + 2OH⁻' },

                'metal': { title: '电冶金', desc: '用于冶炼极活泼金属(Na, Mg, Al)。注意：电解铝通常用 Al₂O₃ 而不是 AlCl₃(共价化合物不导电)，必须加入冰晶石(Na₃AlF₆)降低熔点。', eq: '2Al₂O₃(熔融) ═ 4Al + 3O₂↑' },
                'lead': { title: '铅酸蓄电池', desc: '放电时：负极Pb失电子，正极PbO₂得电子，电解质硫酸。充电时：接线方向必须为正接正、负接负。', eq: 'Pb + PbO₂ + 2H₂SO₄ ⇌ 2PbSO₄ + 2H₂O' },

                'li': '锂电池.html', 'zn': '锌锰干电池.html', 'fuel': '氢氧燃料电池.html'
            };

                { id: 'rxn', text: '化学反应', x: -2.5, y: 0, w: 3, h: 1.2, type: 'dashed' }, { id: 'energy', text: '电能', x: 2.5, y: 0, w: 3, h: 1.2, type: 'dashed' },
                { id: 'eq', text: '方程式书写', x: -7.5, y: 0, w: 3.5, h: 1.2, type: 'solid' }, { id: 'think', text: '认识思路', x: -13, y: 0, w: 3, h: 1.2, type: 'solid' },

            const rawPaths = [
                { points: [[1.5, 0.4, 0], [-1.5, 0.4, 0]], color: C_LINE }, { points: [[-1.5, -0.4, 0], [1.5, -0.4, 0]], color: C_LINE },

                { points: [[-4, 0, 0], [-5.5, 0, 0]], color: C_LINE }, { points: [[-9.5, 0, 0], [-11.2, 0, 0]], color: C_LINE },
                { points: [[-1.5, 4, 0], [-6, 2, 0], [-11.2, 0.5, 0]], color: C_LINE }, { points: [[0, 4.8, 0], [0, 6.2, 0]], color: C_LINE },
                { points: [[1.5, 4, 0], [4.2, 6, 0]], color: C_LINE }, { points: [[1.5, 3.8, 0], [6, 2, 0], [9, 0.5, 0]], color: C_LINE },
                { points: [[-1.5, -4, 0], [-6, -2, 0], [-11.2, -0.5, 0]], color: C_LINE }, { points: [[0, -4.8, 0], [0, -6.2, 0]], color: C_LINE },
                { points: [[1.5, -4, 0], [4.2, -6, 0]], color: C_LINE }, { points: [[1.5, -3.8, 0], [6, -2, 0], [9, -0.5, 0]], color: C_LINE },
                { points: [[7.6, 6.2, 0], [8.6, 8.5, 0]], color: C_LINE }, { points: [[7.6, 6.1, 0], [8.4, 7, 0]], color: C_LINE },
                { points: [[7.6, 5.9, 0], [8.4, 5.5, 0]], color: C_LINE }, { points: [[7.6, 5.8, 0], [8.4, 4, 0]], color: C_LINE },
                { points: [[7.6, -5.8, 0], [8.2, -4, 0]], color: C_LINE }, { points: [[7.6, -5.9, 0], [8.4, -5.5, 0]], color: C_LINE },
                { points: [[7.6, -6.1, 0], [8.2, -7, 0]], color: C_LINE }, { points: [[7.6, -6.2, 0], [8.4, -8.5, 0]], color: C_LINE },
                { points: [[14.8, 0.2, 0], [15.2, 2, 0]], color: C_LINE }, { points: [[14.8, -0.2, 0], [15.2, -2, 0]], color: C_LINE },
                { points: [[-13, 0.8, 0], [-13, 4.2, 0]], color: C_LINE }, { points: [[-13, -0.8, 0], [-13, -4.2, 0]], color: C_LINE },
                { points: [[-9.8, 5, 0], [-10.7, 5, 0]], color: C_GREEN }, { points: [[-14.3, 5, 0], [-15.5, 5, 0]], color: C_GREEN }, { points: [[-18.4, 5, 0], [-19.5, 5, 0]], color: C_GREEN },
                { points: [[-9.9, -5, 0], [-10.5, -5, 0]], color: C_GREEN }, { points: [[-14.4, -5, 0], [-15.0, -5, 0]], color: C_GREEN }, { points: [[-18.9, -5, 0], [-19.5, -5, 0]], color: C_GREEN }
            ];

            function createNodeTexture(node) {
                const res = 256; const canvas = document.createElement('canvas'); canvas.width = node.w * res; canvas.height = node.h * res;
                const ctx = canvas.getContext('2d'); const r = 0.2 * res; const w = canvas.width, h = canvas.height;
                if (node.type !== 'text' && node.type !== 'dashed_bg') {
                    ctx.beginPath(); ctx.moveTo(r, 4); ctx.lineTo(w - r, 4); ctx.quadraticCurveTo(w - 4, 4, w - 4, r);
                    ctx.lineTo(w - 4, h - r); ctx.quadraticCurveTo(w - 4, h - 4, w - r, h - 4);
                    ctx.lineTo(r, h - 4); ctx.quadraticCurveTo(4, h - 4, 4, h - r);
                    ctx.lineTo(4, r); ctx.quadraticCurveTo(4, 4, r, 4); ctx.closePath();
                }
                if (node.id === 'think' || node.type === 'solid') { ctx.fillStyle = '#2563eb'; ctx.fill(); ctx.strokeStyle = '#1d4ed8'; ctx.lineWidth = 6; ctx.stroke(); } 
                else if (node.type === 'dashed') { ctx.fillStyle = '#475569'; ctx.fill(); ctx.lineWidth = 5; ctx.setLineDash([12, 12]); ctx.strokeStyle = '#94a3b8'; ctx.stroke(); ctx.setLineDash([]); } 
                else if (node.type === 'dashed_bg') { 
                    ctx.fillStyle = 'rgba(71, 85, 105, 0.3)'; ctx.fillRect(0,0,w,h); 
                    ctx.lineWidth = 4; ctx.setLineDash([8, 8]); ctx.strokeStyle = '#64748b'; ctx.strokeRect(4,4,w-8,h-8); 
                    return new THREE.CanvasTexture(canvas); 
                } 
                else if (node.type === 'logic_green') { ctx.fillStyle = '#16a34a'; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = '#4ade80'; ctx.stroke(); } 
                else if (node.type === 'logic_pink') { ctx.fillStyle = '#e11d48'; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = '#fb7185'; ctx.stroke(); }
                ctx.fillStyle = '#ffffff';
                let fontSize = Math.min(0.4 * res, (w - 40) / (node.text.length || 1));
                ctx.font = `bold ${fontSize}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(node.text, w / 2, h / 2 + 0.05 * res);
                const texture = new THREE.CanvasTexture(canvas); texture.anisotropy = 8; return texture;
            }

            nodesData.forEach(node => {
                const texture = createNodeTexture(node); let mesh;
                if (node.type === 'text') { 
                    mesh = new THREE.Mesh(new THREE.PlaneGeometry(node.w, node.h), new THREE.MeshBasicMaterial({ map: texture, transparent: true })); 
                    mesh.position.set(node.x, node.y, 0.1); 
                } 
                else if (node.type === 'dashed_bg') { 
                    mesh = new THREE.Mesh(new THREE.PlaneGeometry(node.w, node.h), new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0.6 })); 
                    mesh.position.set(node.x, node.y, -0.5); 
                } 
                else {
                    const geo = new THREE.BoxGeometry(node.w, node.h, 0.22);
                    const matS = new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.8, transparent: true });
                    const matF = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.4, transparent: true });
                    mesh = new THREE.Mesh(geo, [matS, matS, matS, matS, matF, matF]); 
                    mesh.position.set(node.x, node.y, 0); 
                    interactableNodes.push(mesh);
                }
                mesh.userData = { id: node.id, baseZ: mesh.position.z, randomPhase: Math.random() * Math.PI * 2, w: node.w || 3, type: node.type };
                resetTargets.push(mesh); 
                scene.add(mesh);
                mesh.scale.set(0.001, 0.001, 0.001);
                new TWEEN.Tween(mesh.scale).to({ x: 1, y: 1, z: 1 }, 1000).delay(Math.sqrt(node.x**2+node.y**2)*40).easing(TWEEN.Easing.Back.Out).start();
            });

            const tArrow = 0.88; 
            rawPaths.forEach(p => {
                const pts = p.points.map(v => new THREE.Vector3(...v));
                if (pts.length === 2) { const mid = new THREE.Vector3().addVectors(pts[0], pts[1]).multiplyScalar(0.5); mid.z += pts[0].distanceTo(pts[1]) * 0.08; pts.splice(1, 0, mid); }
                const curve = new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.5);
                const subCurve = new THREE.CatmullRomCurve3(Array.from({length:12}, (_,i)=>curve.getPointAt(i*tArrow/11)));
                const tubeGeo = new THREE.TubeGeometry(subCurve, 16, 0.04, 4, false);
                const tubeMat = new THREE.MeshStandardMaterial({ color: p.color, transparent: true, opacity: 0, roughness: 0.5 });
                const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat); 
                tubeMesh.position.z = -0.2;
                scene.add(tubeMesh); resetTargets.push(tubeMesh); allTubesAndArrows.push(tubeMat);

                const arrowPos = curve.getPointAt(tArrow); const arrowTangent = curve.getTangentAt(tArrow).normalize();
                const cone = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.45, 4), new THREE.MeshStandardMaterial({ color: p.color, transparent: true, opacity: 0 }));
                cone.position.copy(arrowPos); cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), arrowTangent);
                scene.add(cone); resetTargets.push(cone); allTubesAndArrows.push(cone.material);

                const eCount = Math.max(1, Math.floor(curve.getLength() / 6.5)); 
                for(let i=0; i<eCount; i++) {
                    const electron = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00aaff, emissiveIntensity: 5.0, transparent: true, opacity: 0 }));
                    electron.userData = { curve: curve, progress: i/eCount, speed: 0.0025+Math.random()*0.002, limit: tArrow };
                    pulseElectrons.push(electron); scene.add(electron); resetTargets.push(electron); allTubesAndArrows.push(electron.material);
                }
            });

            setTimeout(() => { allTubesAndArrows.forEach(m => new TWEEN.Tween(m).to({ opacity: m.emissiveIntensity?1:0.6 }, 1000).start()); }, 1000);

            const ray = new THREE.Raycaster(); const mouse = new THREE.Vector2(); const tooltipEl = document.getElementById('tooltip');
            let tX = 0, tY = 0, isD = false;

            function showTooltip(node, x, y) {
                const data = tooltipData[node.userData.id]; if (!data) return;
                let actionHtml = pageMap[node.userData.id] ? `<button class="tooltip-action-btn" onclick="gotoPage('${pageMap[node.userData.id]}')">🚀 载入 3D 虚拟实验</button>` : '';
                tooltipEl.innerHTML = `<div class="tooltip-title">${data.title}</div><div class="tooltip-desc">${data.desc}</div><div class="tooltip-eq">${data.eq}</div>${actionHtml}`;
                tooltipEl.style.left = `${Math.min(window.innerWidth-160, Math.max(160, x))}px`;
                tooltipEl.style.top = `${y > 150 ? y - 40 : y + 80}px`; 
                tooltipEl.style.opacity = 1;
                // 👉 修复核心 1.1：只有当面板出现时，才允许它内部被点击，否则完全“穿透”面板
                tooltipEl.style.pointerEvents = 'auto'; 
            }

            function createRipple(node) {
                const ringGeo = new THREE.RingGeometry(node.userData.w * 0.4, node.userData.w * 0.4 + 0.15, 16);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.copy(node.position); ring.position.z += 0.2; 
                scene.add(ring);
                new TWEEN.Tween(ring.scale).to({x: 2.2, y: 2.2}, 700).easing(TWEEN.Easing.Cubic.Out).start();
                new TWEEN.Tween(ringMat).to({opacity: 0}, 700).onComplete(() => scene.remove(ring)).start();
            }

            function createSparks(pos) {
                const count = 20; const geo = new THREE.BufferGeometry(); const posArr = new Float32Array(count * 3);
                geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
                const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, blending: THREE.AdditiveBlending });
                const sparks = new THREE.Points(geo, mat); sparks.position.copy(pos); sparks.position.z += 0.5; scene.add(sparks);
                const targets = [];
                for(let i=0; i<count; i++) {
                    const phi = Math.acos(-1 + (2 * i) / count), theta = Math.sqrt(count * Math.PI) * phi, r = 2.0 + Math.random();
                    targets.push(new THREE.Vector3(r * Math.cos(theta) * Math.sin(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(phi)));
                }
                const anim = { v: 0 };
                new TWEEN.Tween(anim).to({v: 1}, 800).onUpdate(() => {
                    const p = sparks.geometry.attributes.position.array;
                    for(let i=0; i<count; i++) { p[i*3]=targets[i].x*anim.v; p[i*3+1]=targets[i].y*anim.v; p[i*3+2]=targets[i].z*anim.v; }
                    sparks.geometry.attributes.position.needsUpdate = true; mat.opacity = 1 - anim.v;
                }).onComplete(() => scene.remove(sparks)).start();
            }

            function resetAll() {
                if (!isFocusMode) return; // 只有处于聚焦状态才需要重置视图，防止误杀平移！
                isFocusMode = false; currentFocusedId = null;
                tooltipEl.style.opacity = 0;
                // 👉 修复核心 1.2：面板消失时，彻底关闭其鼠标响应，让事件能穿透到底部的模型
                tooltipEl.style.pointerEvents = 'none';
                
                if(camTween) camTween.stop();
                if(targetTween) targetTween.stop();

                // 恢复 Z 轴，但不强行将 X 和 Y 拉回 0，保留用户的平移记录！
                const currentTarget = controls.target;
                camTween = new TWEEN.Tween(camera.position).to({ x: currentTarget.x, y: currentTarget.y, z: 65 }, 800).easing(TWEEN.Easing.Cubic.InOut).start();
                targetTween = new TWEEN.Tween(controls.target).to({ x: currentTarget.x, y: currentTarget.y, z: 0 }, 800).easing(TWEEN.Easing.Cubic.InOut).onUpdate(() => controls.update()).start();
                
                resetTargets.forEach(obj => {
                    if (obj.material) {
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        mats.forEach(m => {
                            if(m.opTween) m.opTween.stop(); 
                            const targetOp = (obj.userData && obj.userData.type === 'dashed_bg') ? 0.6 : (m.emissiveIntensity > 0 ? 1.0 : 0.6);
                            m.opTween = new TWEEN.Tween(m).to({ opacity: targetOp }, 600).start();
                        });
                    }
                });
            }

            container.addEventListener('pointerdown', (e) => {
                if(e.target.tagName==='BUTTON') return;
                tX = e.clientX; tY = e.clientY; isD = false;
                mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
                ray.setFromCamera(mouse, camera); const inter = ray.intersectObjects(interactableNodes);
                if (inter.length > 0) { 
                    hoveredNode = inter[0].object; hoveredNode.userData.isHovered = true; 
                    triggerHaptic('light'); 
                }
            });

            container.addEventListener('pointermove', (e) => {
                if(e.pointerType === 'mouse') {
                    mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
                    ray.setFromCamera(mouse, camera); const inter = ray.intersectObjects(interactableNodes);
                    if (inter.length > 0) { 
                        if(hoveredNode && hoveredNode !== inter[0].object) hoveredNode.userData.isHovered = false;
                        if(!hoveredNode || hoveredNode !== inter[0].object) AudioEngine.playHover();
                        hoveredNode = inter[0].object; hoveredNode.userData.isHovered = true; container.style.cursor = 'pointer';
                    } else { if(hoveredNode) hoveredNode.userData.isHovered = false; hoveredNode = null; container.style.cursor = 'default'; }
                } else if (Math.abs(e.clientX-tX)>8 || Math.abs(e.clientY-tY)>8) { isD = true; if(hoveredNode){hoveredNode.userData.isHovered=false;hoveredNode=null;} }
            });

            container.addEventListener('pointerup', (e) => {
                if(e.target.tagName==='BUTTON') return;
                if (isD) return; 

                mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
                ray.setFromCamera(mouse, camera);
                const inter = ray.intersectObjects(interactableNodes);

                if (inter.length > 0) { 
                    const clickedNode = inter[0].object;
                    if (currentFocusedId !== clickedNode.userData.id) {
                        focusOnNode(clickedNode); 
                        setTimeout(() => showTooltip(clickedNode, window.innerWidth / 2, window.innerHeight / 2 + 100), 100); 
                    } else {
                        resetAll(); // 如果点击的是当前聚焦的方块，则退出聚焦
                    }
                } else {
                    if (isFocusMode) resetAll(); // 👉 修复核心 3：如果你没在聚焦模式，点击背景就不会强制把镜头拉回中间，保留了你平移的自由！
                }

                if (e.pointerType !== 'mouse' && hoveredNode) { hoveredNode.userData.isHovered = false; hoveredNode = null; }
            });

            function focusOnNode(node) {
                isFocusMode = true; currentFocusedId = node.userData.id;
                triggerHaptic('heavy'); AudioEngine.playFocus(); createRipple(node); createSparks(node.position);
                
                if(camTween) camTween.stop();
                if(targetTween) targetTween.stop();

                resetTargets.forEach(obj => {
                    if (obj.material) {
                        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                        mats.forEach(m => {
                            if(m.opTween) m.opTween.stop();
                            m.opTween = new TWEEN.Tween(m).to({ opacity: (obj === node) ? 1.0 : 0.15 }, 500).start();
                        });
                    }
                });

                camTween = new TWEEN.Tween(camera.position).to({ x: node.position.x, y: node.position.y, z: 40 }, 1000).easing(TWEEN.Easing.Cubic.Out).start();
                targetTween = new TWEEN.Tween(controls.target).to({ x: node.position.x, y: node.position.y, z: 0 }, 1000).easing(TWEEN.Easing.Cubic.Out).onUpdate(() => controls.update()).start();
            }

            App.resizeHome = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); };

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                pulseElectrons.forEach(e => { e.userData.progress = (e.userData.progress + e.userData.speed) % 1.0; e.position.copy(e.userData.curve.getPointAt(e.userData.progress * e.userData.limit)); });
                interactableNodes.forEach(mesh => {
                    const d = mesh.userData, s = d.isHovered ? 1.12 : 1.0;
                    mesh.scale.x += (s - mesh.scale.x) * 0.15; mesh.scale.y += (s - mesh.scale.y) * 0.15; mesh.scale.z += (s - mesh.scale.z) * 0.15;
                    
                    if (!d.isText && mesh.material instanceof Array) {
                        const targetEmissive = d.isHovered ? 0.3 : 0.0;
                        mesh.material[4].emissiveIntensity += (targetEmissive - mesh.material[4].emissiveIntensity) * 0.1;
                        mesh.material[4].emissive.setHex(0xffffff);
                    }
                    mesh.position.z = Math.sin(t * 2 + d.randomPhase) * 0.12;
                });
                radarMat.uniforms.uTime.value = t;
                stars.rotation.y = t * 0.01;
                TWEEN.update(); controls.update(); composer.render(); 
            }
            animate();
        })();
        window.addEventListener('load', checkOrientation);
    </script>
</body>
